<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMG | Redpepper Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; color: #fafafa; }
        .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .canvas-grid { background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 30px 30px; }
        .loader { border-top-color: #ff4d4d; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <nav class="h-20 border-b border-white/5 px-8 flex items-center justify-between glass z-20">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-red-600 rounded-lg flex items-center justify-center font-bold">VMG</div>
            <h1 class="font-bold">STUDIO.AI <span class="text-[10px] text-zinc-500 ml-2">v2.0</span></h1>
        </div>
    </nav>

    <div class="flex-1 flex overflow-hidden">
        <aside class="w-80 border-r border-white/5 p-6 flex flex-col gap-6 glass">
            <label class="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed border-zinc-800 rounded-[32px] cursor-pointer hover:border-red-500/50 transition-all bg-zinc-900/30">
                <span class="text-xs font-bold text-zinc-400 text-center">Click to Upload <br>Redpepper Assets</span>
                <input type="file" id="uploadInput" class="hidden" accept="image/*" multiple>
            </label>

            <div class="p-4 rounded-2xl bg-zinc-900 border border-white/5">
                <p class="text-[10px] text-zinc-500 uppercase font-bold mb-1">Session Status</p>
                <p id="statusText" class="text-sm font-semibold">System Online</p>
            </div>
        </aside>

        <main class="flex-1 canvas-grid p-10 overflow-y-auto relative">
            <div id="loading" class="hidden flex flex-col items-center justify-center h-full gap-4">
                <div class="loader rounded-full border-4 border-zinc-800 h-12 w-12"></div>
                <p class="text-xs font-bold uppercase tracking-widest">AI processing in progress...</p>
            </div>
            <div id="gallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </main>
    </div>

    <script>
        const uploadInput = document.getElementById('uploadInput');
        const gallery = document.getElementById('gallery');
        const loading = document.getElementById('loading');
        const statusText = document.getElementById('statusText');

        uploadInput.addEventListener('change', async (e) => {
            const files = e.target.files;
            if (files.length === 0) return;

            gallery.innerHTML = '';
            loading.classList.remove('hidden');
            statusText.innerText = "Uploading to Redpepper Engine...";

            const formData = new FormData();
            for (let file of files) formData.append('files', file);

            try {
                // Pointing to the FastAPI endpoint
                const response = await fetch('/remove-bg-multiple', { 
                    method: 'POST', 
                    body: formData 
                });
                
                const result = await response.json();
                
                result.images.forEach(img => {
                    const card = document.createElement('div');
                    card.className = "bg-zinc-900/50 border border-white/5 p-3 rounded-[32px] group";
                    card.innerHTML = `
                        <div class="aspect-square bg-black/40 rounded-[24px] flex items-center justify-center overflow-hidden mb-4 canvas-grid">
                            <img src="${img.data}" class="max-w-[85%] max-h-[85%] object-contain">
                        </div>
                        <div class="flex justify-between items-center px-2">
                            <span class="text-[10px] text-zinc-500 truncate w-32">${img.filename}</span>
                            <a href="${img.data}" download="Isolated-${img.filename}" class="bg-white text-black text-[10px] font-black px-4 py-2 rounded-full">SAVE</a>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
                statusText.innerText = "Processing Complete";
            } catch (err) {
                statusText.innerText = "Server Error - Check Logs";
                console.error(err);
            } finally {
                loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
